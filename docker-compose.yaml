services:
  pyfractal:
    build:
      context: .
      dockerfile: compress.dockerfile
    environment:
      - PROGRAM_NAME=main
      - DATA_DIR=/app/data
      - DATASET=ligand_PO4.txt
    volumes:
      - .:/app
    # command: sh run_metadata_with_different_datasets.sh
    command: python src/compress/main.py
